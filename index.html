<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SecureChat Pro | Premium Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAOvbLmJk51keGvAgsx9BofXzXpz7XS9ms",
            authDomain: "daily-cash-and-earning-app.firebaseapp.com",
            databaseURL: "https://daily-cash-and-earning-app.firebaseio.com",
            projectId: "daily-cash-and-earning-app",
            storageBucket: "daily-cash-and-earning-app.firebasestorage.app",
            messagingSenderId: "297468822284",
            appId: "1:297468822284:web:de720faba6440ba5927f29"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        
        // Make available globally
        window.db = db;
        window.storage = storage;
        window.ref = ref;
        window.push = push;
        window.onChildAdded = onChildAdded;
        window.onValue = onValue;
        window.update = update;
        window.remove = remove;
        window.set = set;
        window.storageRef = storageRef;
        window.uploadBytes = uploadBytes;
        window.getDownloadURL = getDownloadURL;
        
        console.log("✅ Firebase Connected Successfully!");
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #0f0f1a;
        }
        
        /* Glassmorphism Effects */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-header {
            background: rgba(20, 25, 40, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Message Bubbles */
        .msg-sent {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 22px;
            border-bottom-right-radius: 6px;
        }
        
        .msg-received {
            background: rgba(40, 45, 60, 0.9);
            border-radius: 22px;
            border-bottom-left-radius: 6px;
        }
        
        /* Scrollbar */
        .chat-scroll::-webkit-scrollbar {
            width: 5px;
        }
        
        .chat-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .chat-scroll::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 10px;
        }
        
        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-anim {
            animation: fadeIn 0.25s ease-out;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .online-dot {
            animation: pulse 1.5s infinite;
        }
        
        /* Typing Indicator */
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: typingWave 1.2s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingWave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }
        
        /* Button Hover Effects */
        .btn-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-hover:active {
            transform: scale(0.95);
        }
        
        /* Input Focus */
        input:focus, textarea:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
        
        /* Sidebar Active */
        .sidebar-item {
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .sidebar-item:hover {
            background: rgba(139, 92, 246, 0.1);
        }
        
        .sidebar-item.active {
            background: rgba(139, 92, 246, 0.2);
            border-left: 3px solid #8b5cf6;
        }
        
        /* Modal */
        .modal {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

<div class="flex h-screen">
    <!-- ==================== SIDEBAR ==================== -->
    <div class="w-80 glass border-r border-white/10 flex flex-col">
        <!-- User Profile -->
        <div class="p-5 border-b border-white/10">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center text-white font-bold text-lg">
                        U
                    </div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-gray-900 online-dot"></div>
                </div>
                <div class="flex-1">
                    <h3 class="text-white font-semibold" id="userName">User_<span id="userIdDisplay">...</span></h3>
                    <p class="text-white/40 text-xs">Online</p>
                </div>
                <button id="editProfileBtn" class="text-white/40 hover:text-white/80">
                    <i class="fas fa-edit text-sm"></i>
                </button>
            </div>
        </div>
        
        <!-- Search -->
        <div class="p-4">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-white/30 text-sm"></i>
                <input type="text" id="searchChats" placeholder="Search chats..." 
                       class="w-full bg-white/5 rounded-xl pl-9 pr-3 py-2 text-white/80 text-sm border border-white/10 focus:border-purple-500">
            </div>
        </div>
        
        <!-- Chat List -->
        <div class="flex-1 overflow-y-auto">
            <div class="px-3 py-2">
                <h4 class="text-white/40 text-xs uppercase tracking-wider mb-2 px-2">Recent Chats</h4>
                <div id="chatList" class="space-y-1">
                    <!-- Dynamic chat list will appear here -->
                    <div class="sidebar-item p-3 rounded-xl flex items-center gap-3" data-chat="general">
                        <div class="w-10 h-10 rounded-full bg-blue-600/30 flex items-center justify-center">
                            <i class="fas fa-users text-blue-400"></i>
                        </div>
                        <div class="flex-1">
                            <h5 class="text-white text-sm font-medium">General Group</h5>
                            <p class="text-white/40 text-xs">Tap to chat</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Logout / Settings -->
        <div class="p-4 border-t border-white/10">
            <button id="createGroupBtn" class="w-full bg-purple-600/20 hover:bg-purple-600/30 text-purple-300 rounded-xl py-2 text-sm flex items-center justify-center gap-2 transition-all">
                <i class="fas fa-plus"></i> New Group
            </button>
        </div>
    </div>
    
    <!-- ==================== MAIN CHAT AREA ==================== -->
    <div class="flex-1 flex flex-col">
        <!-- Chat Header -->
        <div class="glass-header px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center">
                    <i class="fas fa-comment text-white text-sm"></i>
                </div>
                <div>
                    <h2 class="text-white font-semibold" id="currentChatTitle">General Group</h2>
                    <div class="flex items-center gap-1">
                        <div id="typingStatusIndicator" class="hidden">
                            <span class="text-white/40 text-xs">typing</span>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                        <span id="chatStatus" class="text-white/40 text-xs">Click to start chatting</span>
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="clearChatBtn" class="text-white/40 hover:text-red-400 transition-all">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button id="infoBtn" class="text-white/40 hover:text-white/80 transition-all">
                    <i class="fas fa-info-circle"></i>
                </button>
            </div>
        </div>
        
        <!-- Messages Container -->
        <div id="messagesContainer" class="flex-1 overflow-y-auto p-6 space-y-3 chat-scroll"></div>
        
        <!-- Typing Indicator (Global) -->
        <div id="globalTypingIndicator" class="px-6 pb-2 hidden">
            <div class="flex items-center gap-2">
                <span class="text-white/40 text-xs">Someone is typing</span>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
        
        <!-- Message Input -->
        <div class="p-4 border-t border-white/10 bg-black/20">
            <div class="flex gap-2">
                <button id="emojiBtn" class="bg-white/10 hover:bg-white/20 w-11 h-11 rounded-xl transition-all">
                    <i class="far fa-smile-wink text-white/80"></i>
                </button>
                <input type="text" id="messageInput" placeholder="Type a message..." 
                       class="flex-1 bg-white/5 rounded-xl px-4 py-2.5 text-white text-sm border border-white/10 focus:border-purple-500">
                <button id="attachBtn" class="bg-white/10 hover:bg-white/20 w-11 h-11 rounded-xl transition-all">
                    <i class="fas fa-paperclip text-white/80"></i>
                </button>
                <button id="sendMsgBtn" class="bg-purple-600 hover:bg-purple-500 w-11 h-11 rounded-xl transition-all">
                    <i class="fas fa-paper-plane text-white"></i>
                </button>
            </div>
            <input type="file" id="fileInput" class="hidden" multiple>
            
            <!-- Emoji Picker (Simple) -->
            <div id="emojiPicker" class="hidden glass absolute bottom-20 left-20 p-3 rounded-xl w-64">
                <div class="grid grid-cols-8 gap-2">
                    <span class="emoji text-2xl cursor-pointer hover:scale-125 transition-all">😀</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">😂</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">❤️</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">😍</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">🎉</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">👍</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">🔥</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">💯</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">🤣</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">😎</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">🥰</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">😘</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">🥺</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">😭</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">😱</span>
                    <span class="emoji text-2xl cursor-pointer hover:scale-125">🙏</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Profile Modal -->
<div id="profileModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-50">
    <div class="glass rounded-2xl p-6 w-96">
        <h3 class="text-white font-semibold mb-4">Edit Profile</h3>
        <input type="text" id="editName" placeholder="Enter your name" class="w-full bg-white/10 rounded-xl px-4 py-2 text-white mb-4">
        <div class="flex gap-2">
            <button id="saveProfile" class="flex-1 bg-purple-600 py-2 rounded-xl text-white">Save</button>
            <button id="closeProfile" class="flex-1 bg-white/10 py-2 rounded-xl text-white">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    // Initialize Firebase (already imported via module)
    import { getDatabase, ref, push, onChildAdded, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    
    const db = getDatabase();
    const storage = getStorage();
    
    // App State
    let currentUser = {
        id: localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 8),
        name: localStorage.getItem('userName') || 'Anonymous',
        online: true
    };
    let currentChat = 'general';
    let typingTimeout = null;
    let currentMessagesRef = null;
    
    // Save user info
    localStorage.setItem('userId', currentUser.id);
    localStorage.setItem('userName', currentUser.name);
    
    // Display user ID
    document.getElementById('userIdDisplay').textContent = currentUser.id.slice(-6);
    document.getElementById('userName').textContent = currentUser.name;
    
    // Update user online status
    const userStatusRef = ref(db, `users/${currentUser.id}`);
    set(userStatusRef, {
        name: currentUser.name,
        online: true,
        lastSeen: new Date().toISOString()
    });
    
    // Set offline on page unload
    window.addEventListener('beforeunload', () => {
        set(userStatusRef, { online: false, lastSeen: new Date().toISOString() });
    });
    
    // Function to add message to UI
    function addMessageToUI(message, isSent, fileUrl = null, fileName = null) {
        const messagesDiv = document.getElementById('messagesContainer');
        const msgDiv = document.createElement('div');
        msgDiv.className = `flex ${isSent ? 'justify-end' : 'justify-start'} message-anim`;
        msgDiv.setAttribute('data-message-id', message.id || Date.now());
        
        let content = '';
        if (fileUrl && fileName) {
            if (fileUrl.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                content = `<img src="${fileUrl}" class="max-w-[200px] max-h-40 rounded-lg mb-2 cursor-pointer" onclick="window.open('${fileUrl}')">`;
            } else {
                content = `<a href="${fileUrl}" download class="text-blue-300 underline text-sm flex items-center gap-1"><i class="fas fa-download"></i> ${escapeHtml(fileName)}</a><br>`;
            }
        }
        
        content += `<div class="break-words text-sm">${escapeHtml(message.text || '')}</div>`;
        
        msgDiv.innerHTML = `
            <div class="${isSent ? 'msg-sent' : 'msg-received'} px-3 py-2 max-w-[70%] text-white">
                ${content}
                <div class="flex items-center justify-end gap-1 mt-1">
                    <span class="text-[9px] text-white/40">${new Date(message.timestamp || Date.now()).toLocaleTimeString()}</span>
                    ${isSent ? '<i class="fas fa-check-double text-[8px] text-white/40"></i>' : ''}
                </div>
            </div>
        `;
        
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    // Load messages for current chat
    function loadMessages(chatId) {
        const messagesDiv = document.getElementById('messagesContainer');
        messagesDiv.innerHTML = '<div class="text-center text-white/40 text-sm py-10">Loading messages...</div>';
        
        if (currentMessagesRef) {
            // Remove old listener
        }
        
        const messagesRef = ref(db, `chats/${chatId}/messages`);
        currentMessagesRef = messagesRef;
        
        // Clear existing messages
        messagesDiv.innerHTML = '';
        
        // Listen for new messages
        onChildAdded(messagesRef, (snapshot) => {
            const message = snapshot.val();
            const isSent = message.senderId === currentUser.id;
            addMessageToUI(message, isSent, message.fileUrl, message.fileName);
        });
    }
    
    // Send message
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        const messagesRef = ref(db, `chats/${currentChat}/messages`);
        const newMessage = {
            id: Date.now().toString(),
            text: text,
            senderId: currentUser.id,
            senderName: currentUser.name,
            timestamp: Date.now(),
            read: false
        };
        
        await push(messagesRef, newMessage);
        input.value = '';
        
        // Update typing status
        const typingRef = ref(db, `chats/${currentChat}/typing/${currentUser.id}`);
        await remove(typingRef);
    }
    
    // Send file
    async function sendFile(file) {
        const fileRef = storageRef(storage, `chats/${currentChat}/${Date.now()}_${file.name}`);
        const uploadResult = await uploadBytes(fileRef, file);
        const fileUrl = await getDownloadURL(uploadResult.ref);
        
        const messagesRef = ref(db, `chats/${currentChat}/messages`);
        const newMessage = {
            id: Date.now().toString(),
            text: `📎 ${file.name}`,
            fileUrl: fileUrl,
            fileName: file.name,
            senderId: currentUser.id,
            senderName: currentUser.name,
            timestamp: Date.now(),
            read: false
        };
        
        await push(messagesRef, newMessage);
    }
    
    // Handle typing
    function handleTyping() {
        const typingRef = ref(db, `chats/${currentChat}/typing/${currentUser.id}`);
        set(typingRef, { name: currentUser.name, timestamp: Date.now() });
        
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(async () => {
            await remove(typingRef);
        }, 1500);
    }
    
    // Listen for typing indicators
    function listenForTyping() {
        const typingRef = ref(db, `chats/${currentChat}/typing`);
        onValue(typingRef, (snapshot) => {
            const typingData = snapshot.val();
            const typingIndicator = document.getElementById('globalTypingIndicator');
            if (typingData && Object.keys(typingData).length > 0) {
                const typers = Object.keys(typingData).filter(id => id !== currentUser.id);
                if (typers.length > 0) {
                    typingIndicator.classList.remove('hidden');
                } else {
                    typingIndicator.classList.add('hidden');
                }
            } else {
                typingIndicator.classList.add('hidden');
            }
        });
    }
    
    // Clear chat
    async function clearChat() {
        if (confirm('Are you sure you want to clear all messages?')) {
            const messagesRef = ref(db, `chats/${currentChat}/messages`);
            await remove(messagesRef);
            document.getElementById('messagesContainer').innerHTML = '';
        }
    }
    
    // Initialize default chat
    async function initChat() {
        // Create default chat if not exists
        const chatRef = ref(db, `chats/general`);
        onValue(chatRef, (snapshot) => {
            if (!snapshot.exists()) {
                set(chatRef, { name: 'General Group', createdAt: Date.now() });
            }
        });
        
        loadMessages('general');
        listenForTyping();
    }
    
    // Event Listeners
    document.getElementById('sendMsgBtn').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        } else {
            handleTyping();
        }
    });
    
    document.getElementById('attachBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
    });
    
    document.getElementById('fileInput').addEventListener('change', (e) => {
        if (e.target.files[0]) {
            sendFile(e.target.files[0]);
        }
        e.target.value = '';
    });
    
    document.getElementById('clearChatBtn').addEventListener('click', clearChat);
    
    // Edit Profile
    document.getElementById('editProfileBtn').addEventListener('click', () => {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('profileModal').classList.remove('hidden');
        document.getElementById('profileModal').style.display = 'flex';
    });
    
    document.getElementById('saveProfile').addEventListener('click', () => {
        const newName = document.getElementById('editName').value.trim();
        if (newName) {
            currentUser.name = newName;
            localStorage.setItem('userName', newName);
            document.getElementById('userName').textContent = newName;
            set(ref(db, `users/${currentUser.id}`), { name: newName, online: true });
        }
        document.getElementById('profileModal').style.display = 'none';
        document.getElementById('profileModal').classList.add('hidden');
    });
    
    document.getElementById('closeProfile').addEventListener('click', () => {
        document.getElementById('profileModal').style.display = 'none';
        document.getElementById('profileModal').classList.add('hidden');
    });
    
    // Emoji Picker
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPicker = document.getElementById('emojiPicker');
    emojiBtn.addEventListener('click', () => {
        emojiPicker.classList.toggle('hidden');
    });
    
    document.querySelectorAll('.emoji').forEach(emoji => {
        emoji.addEventListener('click', () => {
            const input = document.getElementById('messageInput');
            input.value += emoji.textContent;
            emojiPicker.classList.add('hidden');
            input.focus();
        });
    });
    
    // Create Group
    document.getElementById('createGroupBtn').addEventListener('click', async () => {
        const groupName = prompt('Enter group name:');
        if (groupName) {
            const groupId = 'group_' + Date.now();
            await set(ref(db, `chats/${groupId}`), {
                name: groupName,
                type: 'group',
                createdAt: Date.now(),
                createdBy: currentUser.id
            });
            alert(`Group "${groupName}" created!`);
            location.reload();
        }
    });
    
    // Chat list click handler
    document.querySelectorAll('.sidebar-item').forEach(item => {
        item.addEventListener('click', () => {
            const chatId = item.getAttribute('data-chat');
            if (chatId) {
                currentChat = chatId;
                document.getElementById('currentChatTitle').textContent = item.querySelector('h5').textContent;
                loadMessages(chatId);
                listenForTyping();
            }
        });
    });
    
    // Initialize
    initChat();
    
    // Update chat status
    setInterval(async () => {
        await set(userStatusRef, { name: currentUser.name, online: true, lastSeen: new Date().toISOString() });
    }, 30000);
    
    console.log('✅ App Initialized! Firebase Connected!');
</script>
</body>
</html>
